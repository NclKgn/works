backend:
  name: github
  repo: NclKgn/works
  branch: main
  base_url: https://sveltia-cms-auth.nikogane.workers.dev

media_folder: public/uploads
public_folder: /works/uploads

collections:
  # ── Lab Entries (private) ──────────────────────────

  - name: lab-entries
    label: "Lab Entries"
    label_singular: "Lab Entry"
    folder: src/content/lab-entries
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [date, title]
    summary: "{{year}}-{{month}}-{{day}} — {{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, modes: [rich_text, raw] }

  # ── Meetings (private) ─────────────────────────────

  - name: meetings
    label: "Meetings"
    label_singular: "Meeting"
    folder: src/content/meetings
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [date, title]
    summary: "{{year}}-{{month}}-{{day}} — {{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
      - { label: Attendees, name: attendees, widget: list, default: [] }
      - { label: Decisions, name: decisions, widget: list, default: [] }
      - { label: Actions, name: actions, widget: list, default: [] }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, modes: [rich_text, raw] }

  # ── Newsletter (public) ────────────────────────────

  - name: newsletter
    label: "Newsletter"
    label_singular: "Newsletter Post"
    folder: src/content/newsletter
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [date, title]
    summary: "{{year}}-{{month}}-{{day}} — {{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
      - { label: Summary, name: summary, widget: text }
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, modes: [rich_text, raw] }

  # ── Projects (public) ──────────────────────────────

  - name: projects
    label: "Projects"
    label_singular: "Project"
    folder: src/content/projects
    create: true
    slug: "{{slug}}"
    sortable_fields: [order, title]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Status, name: status, widget: select, options: [ongoing, completed, upcoming] }
      - { label: Domain, name: domain, widget: select, multiple: true, options: [research, clinical, engineering] }
      - { label: Summary, name: summary, widget: text }
      - { label: Collaborators, name: collaborators, widget: list, default: [] }
      - { label: Order, name: order, widget: number, default: 0, value_type: int }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, modes: [rich_text, raw] }

  # ── Misc (public) ──────────────────────────────────

  - name: misc
    label: "Misc"
    label_singular: "Misc Entry"
    folder: src/content/misc
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Category, name: category, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, modes: [rich_text, raw] }

  # ── Data (public, structured YAML) ─────────────────

  - name: data
    label: "Data"
    files:
      - name: hero
        label: "Hero"
        file: src/data/hero.yaml
        fields:
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Tagline, name: tagline, widget: string }
              - { label: Description, name: description, widget: text }

      - name: phd-progress
        label: "PhD Progress"
        file: src/data/phd-progress.yaml
        fields:
          - label: Overall
            name: overall
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: "Value (%)", name: value, widget: number, value_type: int, min: 0, max: 100 }
          - label: Biology
            name: biology
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: "Value (%)", name: value, widget: number, value_type: int, min: 0, max: 100 }
              - { label: Color, name: color, widget: color, required: false }
          - label: Biomechanics
            name: biomechanics
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: "Value (%)", name: value, widget: number, value_type: int, min: 0, max: 100 }
              - { label: Color, name: color, widget: color, required: false }
          - label: Human Data
            name: human-data
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: "Value (%)", name: value, widget: number, value_type: int, min: 0, max: 100 }
              - { label: Color, name: color, widget: color, required: false }

      - name: cv
        label: "CV"
        file: src/data/cv.yaml
        fields:
          - label: PhD Arts et Métiers
            name: phd-arts-metiers
            widget: object
            fields:
              - { label: Section, name: section, widget: select, options: [education, clinical, research, skills] }
              - { label: Year, name: year, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Medical Degree
            name: medical-degree
            widget: object
            fields:
              - { label: Section, name: section, widget: select, options: [education, clinical, research, skills] }
              - { label: Year, name: year, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Description, name: description, widget: text }
          - label: CMF Necker
            name: cmf-necker
            widget: object
            fields:
              - { label: Section, name: section, widget: select, options: [education, clinical, research, skills] }
              - { label: Year, name: year, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Skull Base PhD
            name: skull-base-phd
            widget: object
            fields:
              - { label: Section, name: section, widget: select, options: [education, clinical, research, skills] }
              - { label: Year, name: year, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Description, name: description, widget: text }

      - name: stack
        label: "Stack"
        file: src/data/stack.yaml
        fields:
          - label: Molecular
            name: molecular
            widget: object
            fields:
              - { label: Layer, name: layer, widget: string }
              - { label: Methods, name: methods, widget: string }
              - { label: Tools, name: tools, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Order, name: order, widget: number, value_type: int }
          - label: 3D Imaging
            name: imaging-3d
            widget: object
            fields:
              - { label: Layer, name: layer, widget: string }
              - { label: Methods, name: methods, widget: string }
              - { label: Tools, name: tools, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Order, name: order, widget: number, value_type: int }
          - label: Biomechanics
            name: biomechanics
            widget: object
            fields:
              - { label: Layer, name: layer, widget: string }
              - { label: Methods, name: methods, widget: string }
              - { label: Tools, name: tools, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Order, name: order, widget: number, value_type: int }
          - label: Clinical Atlas
            name: clinical
            widget: object
            fields:
              - { label: Layer, name: layer, widget: string }
              - { label: Methods, name: methods, widget: string }
              - { label: Tools, name: tools, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Order, name: order, widget: number, value_type: int }

      - name: labs
        label: "Labs"
        file: src/data/labs.yaml
        fields:
          - label: Lab 1
            name: lab-placeholder-1
            widget: object
            fields:
              - { label: Name, name: name, widget: string }
              - { label: PI, name: pi, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Role, name: role, widget: string }
              - { label: Work, name: work, widget: text }
              - { label: URL, name: url, widget: string, required: false }
          - label: Lab 2
            name: lab-placeholder-2
            widget: object
            fields:
              - { label: Name, name: name, widget: string }
              - { label: PI, name: pi, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Role, name: role, widget: string }
              - { label: Work, name: work, widget: text }
              - { label: URL, name: url, widget: string, required: false }

  # ── Section Visibility (public) ────────────────────

  - name: visibility
    label: "Section Visibility"
    files:
      - name: phd
        label: "PhD"
        file: src/data/visibility.yaml
        fields:
          - { label: Visible, name: value, widget: boolean, default: true }
      - name: projects
        label: "Projects"
        file: src/data/visibility.yaml
        fields:
          - { label: Visible, name: value, widget: boolean, default: true }
      - name: cv
        label: "CV"
        file: src/data/visibility.yaml
        fields:
          - { label: Visible, name: value, widget: boolean, default: true }
      - name: stack
        label: "Stack"
        file: src/data/visibility.yaml
        fields:
          - { label: Visible, name: value, widget: boolean, default: true }
      - name: labs
        label: "Labs"
        file: src/data/visibility.yaml
        fields:
          - { label: Visible, name: value, widget: boolean, default: true }
      - name: misc
        label: "Misc"
        file: src/data/visibility.yaml
        fields:
          - { label: Visible, name: value, widget: boolean, default: true }
